<!DOCTYPE html>
<html>
<head>
<title>2 años contigo ❤️</title>

<style>
body{
    background:#ffdde1;
    font-family:Arial;
    text-align:center;
    padding-top:100px;
}

h1{
    font-size:50px;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ff4b6e;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff2a54;
}

#contador{
    font-size:25px;
    margin-top:30px;
    color:#ff2a54;
}
</style>

</head>

<body>

<h1 id="mensaje-aniversario">💖 Feliz 2 años 💖</h1>
    

<p>Desde que estás en mi vida todo funciona mejor.</p>

<button onclick="mensaje()">Haz clic aquí</button>

<p id="contador"></p>

<script>
// Función para mostrar mensaje del botón
function mensaje(){
    alert("Eres mi persona favorita ❤️");
}

// Contador de días juntos
// Cambia la fecha de inicio a la de vuestra relación
let inicio = new Date("2024-02-16"); // AAAA-MM-DD
let hoy = new Date();

// Diferencia en milisegundos
let diferencia = hoy - inicio;
    
// Convertir a días
let dias = Math.floor(diferencia / (1000*60*60*24));

// Convertir a años
let anios =  Math.floor(dias / 365);

    
// Mostrar en el <p> con id "contador"
document.getElementById("contador").innerHTML =
"Llevamos " + dias + " días juntos ❤️";

//Modificar el número de años juntos
document.getElementById("mensaje-aniversario").innerHTML =
    "💖 Feliz " + anios + " años 💖";

</script>

</body>
</html>
