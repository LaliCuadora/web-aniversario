<!DOCTYPE html>
<html>
<head>
<title>Te quiero ❤️</title>

<style>
/* General */
body {
    background:#ffdde1;
    font-family:Arial, sans-serif;
    text-align:center;
    padding-top:50px;
    margin:0;
}

/* Título principal */
h1 {
    font-size:50px; /* tamaño base para escritorio */
    margin-bottom:20px;
}

/* Botón */
button {
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ff4b6e;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#ff2a54;
}

/* Contador de días */
#contador {
    font-size:25px;
    margin-top:30px;
    color:#ff2a54;
}

/* Equivalencias (sushi u otras) */
.equivalencia {
    font-size:22px;
    margin-top:20px;
    color:#ff6f85;
    font-style:italic;
    line-height:1.4;
}

/* Imagen responsive */
img {
    width:80%;
    max-width:300px;
    height:auto;
    margin-top:20px;
}

/* Ajustes para pantallas medianas (tablets) */
@media (max-width:768px) {
    h1 { font-size:35px; }
    button { font-size:16px; padding:12px 25px; }
    #contador { font-size:20px; }
    .equivalencia { font-size:18px; }
}

/* Ajustes para pantallas pequeñas (móviles) */
@media (max-width:480px) {
    h1 { font-size:28px; }
    button { font-size:14px; padding:10px 20px; }
    #contador { font-size:16px; }
    .equivalencia { font-size:14px; }
}
</style>

</head>

<body>

<h1 id="mensaje-aniversario">💖 Feliz 2 años 💖</h1>

<img src="https://github.com/LaliCuadora/web-aniversario/raw/main/IMG-20260206-WA0111.jpg" alt="Foto nuestra">

<p style="color:#ff2a54;">Desde que estás en mi vida todo funciona mejor.</p>

<button onclick="mensaje()">Haz clic aquí</button>

<p id="contador"></p>

<p class="equivalencia" id="equivalencia_sushi"></p>

<script>
// Función para mostrar mensaje del botón
function mensaje() {     
    let msg = [
        "Eres mi persona favorita ❤️",
        "Contigo todo es mejor 💖",
        "Si volviera a empezar, te elegiría otra vez",
        "Gracias por hacer mi vida más bonita",
        "Cada día contigo es mi favorito",
        "Eres mi lugar seguro",
        "Gracias por ser quién eres",
        "Si la vida fuera código, tú serías mi función favorita",
        "Eres mi 29 de febrero",
        "Te quiero más que ayer pero mucho menos que mañana"
    ];    
    
    alert(msg[Math.floor(Math.random() * msg.length)]);
}

// CONSTANTES
const precio = 1.4; // precio aproximado
const inicio = new Date("2024-03-16"); // AAAA-MM-DD
const hoy = new Date();

// Diferencia en milisegundos
const diferencia = hoy - inicio;

// Convertir a días
const dias = Math.floor(diferencia / (1000*60*60*24));

// Convertir a años
const anios = Math.floor(dias / 365);

// Equivalencia en piezas de sushi (1 pieza = 1,4 días)
const equivalencia_sushi = Math.floor(dias / precio);

// Mostrar resultados
document.getElementById("contador").innerHTML =
    "Llevamos " + dias + " días juntos ❤️";

document.getElementById("mensaje-aniversario").innerHTML =
    "💖 Felices " + anios + " años 💖";

document.getElementById("equivalencia_sushi").innerHTML =
    "Eso equivale a " + equivalencia_sushi + " piezas de sushi 🍣";

</script>

</body>
</html>
